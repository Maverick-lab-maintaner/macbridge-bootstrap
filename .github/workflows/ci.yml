name: MacBridge CI

on:
  push:
    branches: [master, main]
    paths:
      - '**.sh'
      - '**.ps1'
      - '**.go'
      - '**.py'
      - 'go.mod'
      - 'go.sum'
      - 'ops/radar/requirements.txt'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - '**.sh'
      - '**.ps1'
      - '**.go'
      - '**.py'
      - 'go.mod'
      - 'go.sum'
      - 'ops/radar/requirements.txt'

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          format: tty
          # error-level: genuine bugs (parse errors, bad expansions) block the
          # build; SC2034/SC2207-style warnings are advisory. See shortlist.md
          # (SH1) for the tracked warning-cleanup + fallback-helper dedup.
          severity: error
          ignore_paths: '.git .cache'

  syntax-check:
    name: Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all .sh scripts parse without errors
        run: |
          echo "Checking all shell scripts for syntax errors..."
          FAILED=0
          while IFS= read -r -d '' script; do
            echo -n "  $script ... "
            if bash -n "$script" 2>&1; then
              echo "OK"
            else
              echo "FAILED"
              FAILED=1
            fi
          done < <(find . -name '*.sh' -not -path './.git/*' -not -path './.cache/*' -print0)
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more scripts have syntax errors"
            exit 1
          fi
          echo "All scripts passed syntax validation."

      - name: Validate PowerShell syntax (provision.ps1)
        if: false  # Disabled on Linux runner — no pwsh parser without PowerShell
        run: echo "Skipping PowerShell check on Linux runner"

  test-harness:
    name: Test Harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run test harness
        run: |
          if [ -f test/run-tests.sh ]; then
            bash test/run-tests.sh
          else
            echo "No test harness found."
          fi

  go:
    name: Go Control Plane
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  radar:
    name: Radar (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ops/radar
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ops/radar/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall .

      - name: Test
        run: python -m pytest -q
