name: MacBridge CI

on:
  push:
    branches: [master, main]
    paths:
      - '**.sh'
      - '**.ps1'
      - '**.go'
      - '**.py'
      - 'go.mod'
      - 'go.sum'
      - 'ops/radar/requirements.txt'
      - 'commerce/**'
      - 'dashboard/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - '**.sh'
      - '**.ps1'
      - '**.go'
      - '**.py'
      - 'go.mod'
      - 'go.sum'
      - 'ops/radar/requirements.txt'
      - 'commerce/**'
      - 'dashboard/**'

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          format: tty
          # warning-level: the tree is clean of SC2034/SC2207 (SH1 done), so
          # warnings are enforced again to catch new dead code and bad splits.
          severity: warning
          ignore_paths: '.git .cache'

  syntax-check:
    name: Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all .sh scripts parse without errors
        run: |
          echo "Checking all shell scripts for syntax errors..."
          FAILED=0
          while IFS= read -r -d '' script; do
            echo -n "  $script ... "
            if bash -n "$script" 2>&1; then
              echo "OK"
            else
              echo "FAILED"
              FAILED=1
            fi
          done < <(find . -name '*.sh' -not -path './.git/*' -not -path './.cache/*' -print0)
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more scripts have syntax errors"
            exit 1
          fi
          echo "All scripts passed syntax validation."

      - name: Validate PowerShell syntax (provision.ps1)
        if: false  # Disabled on Linux runner — no pwsh parser without PowerShell
        run: echo "Skipping PowerShell check on Linux runner"

  test-harness:
    name: Test Harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run test harness
        run: |
          if [ -f test/run-tests.sh ]; then
            bash test/run-tests.sh
          else
            echo "No test harness found."
          fi

  go:
    name: Go Control Plane
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  keygen-compat:
    name: License Keygen Compatibility (JS <-> Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The JS keygen (commerce) and the Go license package (CLI) must stay
      # byte-exact — drift makes sold keys invalid. The vector test pins them.
      - name: JS keygen vectors + worker syntax
        run: |
          node commerce/test-keygen.mjs
          node --check commerce/lemonsqueezy-webhook.js
          node --check dashboard/customer-api.js

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Cross-validate a JS-generated key with the Go implementation
        run: |
          JSKEY=$(node -e "import('./commerce/keygen.mjs').then(m => console.log(m.generateKey()))")
          echo "JS key: $JSKEY"
          mkdir -p cmd/xval
          cat > cmd/xval/main.go <<'EOF'
          package main

          import (
            "fmt"
            "os"

            "github.com/Maverick-lab-maintaner/macbridge-bootstrap/internal/license"
          )

          func main() {
            if err := license.Validate(os.Args[1]); err != nil {
              fmt.Println("GO REJECTS:", err)
              os.Exit(1)
            }
            fmt.Println("GO ACCEPTS")
          }
          EOF
          go run ./cmd/xval "$JSKEY"

  radar:
    name: Radar (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ops/radar
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ops/radar/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall .

      - name: Test
        run: python -m pytest -q
