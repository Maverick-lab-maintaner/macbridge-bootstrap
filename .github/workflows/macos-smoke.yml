name: macOS Smoke (free Apple-hardware test bed)

# Two roles:
#  1. On-demand test bed (workflow_dispatch) — validates the tooling on REAL
#     macOS without renting a Mac. See docs/LOCAL_TESTING.md.
#  2. NIGHTLY BUILD VERIFICATION AGENT (schedule) — the safety net from
#     MAINTENANCE_AGENT_ARCHITECTURE: every night, a clean Mac runs the full
#     agent-tier install through a real flutter build ios. When Apple or
#     Flutter ships something that breaks the pipeline, this goes red and
#     GitHub emails the owner BEFORE a customer hits it. Free on a public repo.
on:
  schedule:
    - cron: "17 5 * * *" # nightly 05:17 UTC — full agent-tier bootstrap
  workflow_dispatch:
    inputs:
      run_bootstrap:
        description: "Also install Flutter and run bootstrap --from 2 (slower)"
        type: boolean
        default: false
      tier:
        description: "Bootstrap tier for the install smoke"
        type: choice
        options: [vanilla, agent]
        default: vanilla

jobs:
  smoke:
    name: Tooling runs on real macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Environment info
        run: |
          sw_vers
          xcodebuild -version || true
          echo "ruby: $(ruby --version)"; echo "pod: $(pod --version 2>/dev/null || echo none)"

      # Each tool may exit non-zero on a degraded/blocked state (expected without Flutter/
      # certs). We only assert it RUNS and emits a VALID status contract.
      - name: verify.sh emits a valid contract
        run: |
          bash verify.sh --json > /tmp/verify.json || true
          python3 -c "import json; d=json.load(open('/tmp/verify.json')); print('verify state:', d['summary']['state'])"

      - name: doctor.sh emits valid JSON
        run: |
          bash doctor.sh --json > /tmp/doctor.json || true
          python3 -c "import json; d=json.load(open('/tmp/doctor.json')); print('doctor issues:', d.get('issue_count'))"

      - name: signing-doctor.sh emits a valid contract
        run: |
          bash signing-doctor.sh --json > /tmp/signing.json || true
          python3 -c "import json; d=json.load(open('/tmp/signing.json')); print('signing state:', d['summary']['state'])"

      - name: readiness.sh renders
        run: bash readiness.sh --quick || true

      - name: golden-image.sh manifest is valid JSON
        run: |
          bash golden-image.sh manifest > /tmp/manifest.json
          python3 -c "import json; d=json.load(open('/tmp/manifest.json')); print('xcode:', d['components']['xcode'])"

      # ── Studio CLI on real macOS: the actual product surface ──
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Build the macbridge CLI (embedded tooling)
        run: |
          go test ./internal/license/ ./cmd/macbridge/...
          go build -o /tmp/macbridge ./cmd/macbridge
          /tmp/macbridge --version

      - name: CLI license lifecycle (free -> pro)
        run: |
          /tmp/macbridge license | grep -q "free" && echo "OK starts free"
          KEY=$(go run ./cmd/mbkeygen)
          /tmp/macbridge activate "$KEY" | grep -q "Pro" && echo "OK activated"
          /tmp/macbridge license | grep -q "pro" && echo "OK persists"
          # A tampered key must be rejected:
          if /tmp/macbridge activate MB-AAAA-BBBB-CCCC-DDDD 2>/dev/null; then
            echo "tampered key accepted!"; exit 1
          fi
          echo "OK rejects bad keys"

      - name: CLI local status + doctor on this Mac
        run: |
          /tmp/macbridge status || true          # exits nonzero on a blocked bare runner — expected
          /tmp/macbridge doctor || true
          /tmp/macbridge doctor --signing --json > /tmp/cli-signing.json || true
          python3 -c "import json; d=json.load(open('/tmp/cli-signing.json')); print('cli signing state:', d['summary']['state'])"

      # Optional: the full product path — `macbridge install` end-to-end.
      # Nightly runs always take the full path at agent tier; dispatches opt in.
      - name: macbridge install smoke (opt-in / nightly)
        if: ${{ inputs.run_bootstrap || github.event_name == 'schedule' }}
        run: |
          brew install --cask flutter || true
          /tmp/macbridge install --from 2 --tier "${{ inputs.tier || 'agent' }}" --agents all
          /tmp/macbridge status

      # Agent tier only: the three advertised agents must actually resolve —
      # this is the "type claude/opencode/codex and it works" promise. Strict
      # on purpose: if a package name is wrong, we want red here, not on a
      # customer's Mac.
      - name: agents actually installed (agent tier)
        if: ${{ (inputs.run_bootstrap && inputs.tier == 'agent') || github.event_name == 'schedule' }}
        run: |
          for a in claude opencode codex; do
            if command -v "$a" >/dev/null 2>&1; then
              echo "OK  $a -> $(command -v "$a")"
            else
              echo "MISSING: $a did not install"; exit 1
            fi
          done
